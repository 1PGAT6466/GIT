<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝利根 · 智慧平台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23ff6700'/><text x='32' y='46' text-anchor='middle' font-size='42' font-weight='bold' fill='white'>▣</text></svg>">
<style>
:root {
  --bg: #fff; --bg2: #f5f5f5; --card: #fff;
  --border: #e8e8e8; --text: #191919; --text2: #666; --text3: #999;
  --accent: #ff6700; --accent2: #ff8c42; --accent-light: #fff4ed;
  --green: #07c160; --red: #e53935;
  --shadow: 0 2px 12px rgba(0,0,0,.04); --shadow-hover: 0 8px 24px rgba(0,0,0,.08);
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg2); color: var(--text); min-height:100vh; line-height:1.6;
}
.container { max-width:1200px; margin:0 auto; padding:0 24px; }
/* NAV */
.nav {
  position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.78); backdrop-filter:saturate(180%) blur(20px);
}
.nav-inner {
  display:flex; align-items:center; justify-content:space-between;
  max-width:1200px; margin:0 auto; padding:12px 24px;
}
.nav-logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; }
.nav-logo .icon {
  width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center;
  font-size:18px; color:#fff; font-weight:800;
}
.nav-tabs { display:flex; gap:2px; }
.nav-tab {
  padding:8px 20px; border-radius:8px; font-size:14px; font-weight:500;
  cursor:pointer; color:var(--text2); border:none; background:transparent;
  font-family:inherit; transition:all .2s;
}
.nav-tab:hover { color:var(--text); background:var(--bg2); }
.nav-tab.active { color:var(--accent); background:var(--accent-light); font-weight:600; }
.nav-status { display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; background:#fafafa; font-size:13px; color:var(--text2); }
#statusDot { width:7px; height:7px; border-radius:50%; background:var(--green); }
#statusDot.off { background:var(--red); }
/* CONFIG */
.config-bar { display:flex; justify-content:center; gap:20px; align-items:center; margin-bottom:28px; font-size:13px; color:var(--text3); flex-wrap:wrap; }
.config-bar label { font-weight:500; color:var(--text2); }
.config-bar input { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:8px; font-size:13px; width:220px; font-family:inherit; outline:none; }
.config-bar input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,103,0,.08); }
/* STATS */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
.stat-box { background:var(--card); border-radius:var(--radius); padding:24px; text-align:center; box-shadow:var(--shadow); transition:all .3s; }
.stat-box:hover { box-shadow:var(--shadow-hover); transform:translateY(-2px); }
.stat-val { font-size:36px; font-weight:800; }
.stat-lbl { font-size:13px; color:var(--text3); margin-top:6px; }
/* HERO */
.hero { text-align:center; padding:48px 0 40px; background:var(--card); border-radius:24px; margin-bottom:32px; box-shadow:var(--shadow); }
.hero h1 { font-size:40px; font-weight:800; margin-bottom:12px; }
.hero p { font-size:16px; color:var(--text2); max-width:500px; margin:0 auto 32px; }
.search-wrap { max-width:600px; margin:0 auto; display:flex; background:#fafafa; border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:all .3s ease; position:relative; }
.search-wrap:focus-within { border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,103,0,.06); transform:scale(1.01); }
.search-wrap input { flex:1; background:transparent; border:none; outline:none; padding:14px 44px 14px 20px; font-size:15px; color:var(--text); font-family:inherit; transition:all .2s; }
.search-wrap input::placeholder { color:var(--text3); transition:color .3s; }
.search-wrap:focus-within input::placeholder { color:#ccc; }
.search-wrap .clear-btn { position:absolute; right:110px; top:50%; transform:translateY(-50%); width:28px; height:28px; border-radius:50%; border:none; background:transparent; cursor:pointer; color:var(--text3); font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; opacity:0; pointer-events:none; }
.search-wrap .clear-btn.visible { opacity:1; pointer-events:auto; }
.search-wrap .clear-btn:hover { background:#e8e8e8; color:var(--text); }
.search-wrap button { padding:14px 32px; background:var(--accent); color:#fff; border:none; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap; }
.search-wrap button:hover { background:var(--accent2); transform:scale(1.02); }
.search-wrap button:active { transform:scale(.97); }
.search-wrap button:disabled { background:#d0d0d0; cursor:not-allowed; transform:none; }
.modes { display:flex; gap:6px; justify-content:center; margin-top:16px; }
.mode-btn { padding:8px 22px; border-radius:20px; font-size:13px; cursor:pointer; font-family:inherit; border:1px solid var(--border); background:var(--card); color:var(--text2); transition:all .25s ease; }
.mode-btn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
.mode-btn:active { transform:scale(.95); }
.mode-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(255,103,0,.25); }
/* PAGE */
.page-sec { display:none; }
.page-sec.active { display:block; }
.sec-title { font-size:22px; font-weight:700; margin-bottom:20px; padding-left:14px; border-left:4px solid var(--accent); }
.sec-subtitle { font-size:15px; color:var(--text2); margin-bottom:24px; }
/* TOOLS */
.tool-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px; margin-bottom:40px; }
.tool-card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); cursor:pointer; transition:all .3s; display:flex; gap:16px; align-items:flex-start; }
.tool-card:hover { box-shadow:var(--shadow-hover); transform:translateY(-2px); }
.tool-card .tc-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; background:#fafafa; }
.tool-card h3 { font-size:16px; font-weight:600; margin-bottom:4px; }
.tool-card p { font-size:13px; color:var(--text3); line-height:1.5; }
/* QUESTIONS */
.q-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; margin-bottom:40px; }
.q-item { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px 18px; cursor:pointer; transition:all .25s; display:flex; align-items:center; gap:12px; }
.q-item:hover { border-color:var(--accent); background:var(--accent-light); }
.q-cat { font-size:11px; font-weight:600; padding:4px 12px; border-radius:6px; background:var(--accent-light); color:var(--accent); white-space:nowrap; flex-shrink:0; }
.q-text { font-size:14px; color:var(--text2); line-height:1.5; }
/* RESULTS */
.results-area { margin-bottom:32px; }
.result-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; margin-bottom:10px; box-shadow:var(--shadow); transition:all .2s; cursor:default; }
.result-card:hover { border-color:var(--accent); box-shadow:0 4px 16px rgba(255,103,0,.08); }
.result-card .rc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:10px; }
.result-card .rc-file { font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:6px; flex:1; min-width:0; }
.result-card .rc-file span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.result-card .rc-score { font-size:11px; font-weight:600; padding:3px 10px; border-radius:10px; background:var(--accent-light); color:var(--accent); white-space:nowrap; flex-shrink:0; }
.result-card .rc-score.high { background:rgba(7,193,96,.12); color:var(--green); }
.result-meta { display:flex; gap:8px; margin-bottom:8px; font-size:11px; align-items:center; flex-wrap:wrap; }
.trust-badge { padding:3px 12px; border-radius:12px; font-weight:600; font-size:11px; }
.trust-badge.verified { background:rgba(7,193,96,.1); color:var(--green); }
.trust-badge.unverified { background:var(--accent-light); color:var(--accent); }
.trust-badge.outdated,.trust-badge.flagged { background:rgba(229,57,53,.1); color:var(--red); }
.tag-pill { background:#fafafa; color:var(--text3); padding:3px 10px; border-radius:6px; font-size:11px; }
.result-text { font-size:13px; line-height:1.7; color:var(--text2); white-space:pre-wrap; position:relative; }
.result-text.collapsed { max-height:160px; overflow:hidden; }
.result-text.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:40px; background:linear-gradient(transparent,var(--card)); }
.result-text .cfg { color:var(--text); font-family:'Cascadia Code','Fira Code','Consolas',monospace; font-size:12px; background:#f8f8f8; display:inline; }
.result-actions { display:flex; gap:8px; margin-top:8px; align-items:center; }
.btn-sm { padding:5px 14px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; border:1px solid var(--border); background:var(--card); color:var(--text2); transition:all .15s; }
.btn-sm:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
.result-footer { display:flex; justify-content:space-between; align-items:center; margin-top:12px; font-size:12px; color:var(--text3); }
.audit-note { color:var(--accent); font-style:italic; }
/* AI */
.ai-box { background:var(--card); border:2px solid var(--accent); border-radius:var(--radius); padding:28px; margin-bottom:24px; }
.ai-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; font-size:15px; font-weight:700; color:var(--accent); }
.ai-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:aiPulse 2s infinite; }
@keyframes aiPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.ai-text { font-size:15px; line-height:1.9; color:var(--text); }
.ai-text h2,.ai-text h3 { margin:16px 0 8px; color:var(--text); }
.ai-text code { background:#f4f4f4; padding:2px 6px; border-radius:4px; font-size:13px; font-family:'Cascadia Code','Fira Code',monospace; }
.ai-text pre { background:#1e1e1e; color:#d4d4d4; padding:14px 18px; border-radius:10px; overflow-x:auto; font-size:12px; line-height:1.6; margin:8px 0; }
.ai-text pre code { background:transparent; padding:0; color:inherit; }
.ai-text blockquote { border-left:3px solid var(--accent); margin:8px 0; padding:4px 14px; color:var(--text2); background:#fafafa; border-radius:0 8px 8px 0; }
.ai-text ul,.ai-text ol { padding-left:20px; margin:8px 0; }
.ai-text .ref-link { display:inline; color:var(--accent); font-weight:600; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }
.ai-text .ref-link:hover { color:var(--accent2); }
.ai-sources { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.ai-sources .src-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; font-size:12px; cursor:pointer; border-radius:6px; transition:background .15s; }
.ai-sources .src-item:hover { background:var(--accent-light); }
.ai-sources .src-num { color:var(--accent); font-weight:700; flex-shrink:0; min-width:18px; }
.ai-sources .src-info { flex:1; min-width:0; }
.ai-sources .src-file { color:var(--text2); font-weight:500; }
.ai-sources .src-preview { color:var(--text3); font-size:11px; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ai-actions { display:flex; gap:8px; margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.ai-skeleton { padding:20px 0; }
.ai-skeleton .sk-line { height:12px; background:var(--border); border-radius:6px; margin-bottom:10px; animation:skPulse 1.5s infinite; }
.ai-skeleton .sk-line:nth-child(2){width:85%} .ai-skeleton .sk-line:nth-child(3){width:60%} .ai-skeleton .sk-line:nth-child(4){width:75%}
@keyframes skPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
/* UPLOAD */
.upload-zone { background:var(--card); border:2px dashed var(--border); border-radius:var(--radius); padding:32px; text-align:center; margin-bottom:40px; transition:all .3s; }
.upload-zone:hover,.upload-zone.dragover { border-color:var(--accent); background:var(--accent-light); }
.upload-zone h3 { font-size:17px; font-weight:600; margin-bottom:8px; }
.upload-zone .uz-hint { font-size:13px; color:var(--text3); margin-bottom:20px; }
.upload-row { display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap; }
.upload-row input[type=file] { font-size:13px; color:var(--text2); }
.upload-row input[type=file]::file-selector-button { padding:8px 18px; border-radius:8px; background:#fafafa; border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; cursor:pointer; margin-right:12px; }
.btn-accent { padding:10px 28px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-accent:hover { background:var(--accent2); }
.upload-msg { font-size:13px; margin-top:12px; }
.upload-msg.ok { color:var(--green); }
.upload-msg.err { color:var(--red); }
.history-tag { padding:4px 14px; background:#f0f0f0; border-radius:16px; font-size:12px; cursor:pointer; color:var(--text2); transition:all .2s; }
.history-tag:hover { background:var(--accent-light); color:var(--accent); }
.search-highlight { background:var(--accent-light); color:var(--accent); font-weight:600; padding:1px 3px; border-radius:3px; }
.upload-progress { width:100%; height:6px; background:var(--border); border-radius:3px; margin-top:12px; overflow:hidden; }
.upload-progress-bar { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; width:0; }
/* MISC */
.footer { text-align:center; padding:40px 0; color:var(--text3); font-size:13px; }
.empty { text-align:center; padding:60px 20px; color:var(--text3); }
.empty .icon { font-size:48px; margin-bottom:16px; opacity:.3; transition:opacity .4s; }
.empty:hover .icon { opacity:.45; }
.empty p { font-size:15px; font-weight:500; }
.empty .hint { font-size:13px; margin-top:8px; color:var(--text2); }
.loading { text-align:center; padding:40px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
/* Fade-in animation for results */
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.result-card { animation: fadeSlideUp .35s ease both; }
.result-card:nth-child(1) { animation-delay: 0s; }
.result-card:nth-child(2) { animation-delay: .05s; }
.result-card:nth-child(3) { animation-delay: .1s; }
.result-card:nth-child(4) { animation-delay: .15s; }
.result-card:nth-child(5) { animation-delay: .2s; }
.result-card:nth-child(6) { animation-delay: .25s; }
.result-card:nth-child(7) { animation-delay: .3s; }
.result-card:nth-child(8) { animation-delay: .35s; }
.result-card:nth-child(9) { animation-delay: .4s; }
.result-card:nth-child(10) { animation-delay: .45s; }
/* Ripple-like focus for search */
.search-wrap input:focus { box-shadow: inset 0 0 0 2px rgba(255,103,0,.05); }
@media(max-width:768px){ .nav-inner{flex-direction:column} .search-wrap{flex-direction:column} .stats{grid-template-columns:1fr} .tool-grid,.q-grid{grid-template-columns:1fr} .hero h1{font-size:28px} }
</style>
</head>
<body>
<div class="nav"><div class="nav-inner">
<div class="nav-logo"><div class="icon">▣</div>宝利根智慧平台</div>
<div class="nav-tabs">
<button class="nav-tab active" onclick="switchPage('kb',this)">知识库</button>
<button class="nav-tab" onclick="switchPage('tools',this)">常用工具</button>
<button class="nav-tab" onclick="switchPage('qa',this)">常见问题</button>
</div>
<div class="nav-status"><div id="statusDot"></div><span id="statusLabel">连接中…</span></div>
</div></div>

<div class="container">
<div class="config-bar">
<label>服务器</label><input id="apiBase" onchange="refreshStats()">
<label id="keyLabel">Mimo Key</label><input type="password" id="mimoKey" placeholder="首次使用需输入…" onchange="saveKey()">
</div>
<div class="stats">
<div class="stat-box"><div class="stat-val" id="statFiles">—</div><div class="stat-lbl">文档数</div></div>
<div class="stat-box"><div class="stat-val" id="statChunks">—</div><div class="stat-lbl">知识片段</div></div>
<div class="stat-box"><div class="stat-val" id="statUptime">v2.4</div><div class="stat-lbl">服务状态</div></div>
</div>

<div class="page-sec active" id="page-kb">
<div class="hero">
<h1>搜索企业智慧</h1>
<p>AI 驱动的语义检索，覆盖网络拓扑、产线指标、采购合同、IT 资产等全公司文档。</p>
<div class="search-wrap">
<input id="searchInput" placeholder="输入关键词… 如 VLAN 配置、OEE 指标" onkeydown="if(event.key==='Enter')doSearch()" oninput="toggleClearBtn()">
<button class="clear-btn" id="clearBtn" onclick="clearSearch()" title="清除">✕</button>
<button onclick="doSearch()" id="searchBtn">搜索</button>
</div>
<div class="modes">
<button class="mode-btn active" onclick="setMode('search',this)">🔍 关键词</button>
<button class="mode-btn" onclick="setMode('ai',this)">🤖 智能问答</button>
</div>
</div>
<div id="aiArea" style="display:none"></div>
<div id="searchHistory" style="display:none;margin-bottom:20px;padding:12px 16px;background:var(--bg);border-radius:12px;border:1px solid var(--border)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong style="font-size:13px;color:var(--text2)">🕐 最近搜索</strong><button onclick="clearHistory()" style="font-size:11px;color:var(--text3);border:none;background:none;cursor:pointer;font-family:inherit">清除</button></div>
<div id="historyTags" style="display:flex;flex-wrap:wrap;gap:6px"></div>
</div>
<div class="results-area" id="resultsArea">
<div class="empty"><div class="icon">🔎</div><p>输入关键词，搜索公司内部文档</p><p class="hint">试试：VLAN 配置、OEE 指标、软件授权</p></div>
</div>
<div class="upload-zone">
<h3>上传文档</h3>
<p class="uz-hint">支持文档 / CAD / 三维模型 · .txt .docx .xlsx .pdf .pptx .dxf .dwg .stl .obj .step 等 · 自动分词、向量化、入库</p>
<div class="upload-row">
<input type="file" id="fileInput" multiple accept=".txt,.md,.csv,.docx,.doc,.xlsx,.xls,.pdf,.pptx,.ppt,.cfg,.log,.ini,.conf,.json,.xml,.html,.htm,.dxf,.dwg,.stl,.obj,.step,.stp,.iges,.igs,.gltf,.glb" onchange="onFilesPicked(this)">
<input type="file" id="folderInput" webkitdirectory style="display:none">
<button class="btn-accent" onclick="document.getElementById('fileInput').click()">上传文件</button>
<button class="btn-accent" style="background:#666" onclick="pickFolder()">上传文件夹</button>
</div>
<div class="upload-msg" id="uploadMsg"></div>
<div class="upload-progress" id="uploadProgress" style="display:none"><div class="upload-progress-bar" id="uploadBar"></div></div>
</div>
</div>

<div class="page-sec" id="page-tools">
<div class="sec-title">常用工具</div>
<div class="tool-grid" id="toolGrid"></div>
</div>

<div class="page-sec" id="page-qa">
<div class="sec-title">常见问题</div>
<p class="sec-subtitle">点击问题，立即搜索知识库获取答案。</p>
<div class="q-grid" id="qGrid"></div>
</div>

<div class="footer">宝利根企业智慧平台 · 内部使用</div>
</div>

<script>
// ====== 稳定性核心：fetch 超时 + 重试 + 全局错误边界 ======
var FETCH_TIMEOUT = 15000;
var FETCH_RETRIES = 2;
var MAX_POLL_RETRIES = 30;
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function fetchWithTimeout(url, options, timeoutMs, retries) {
  timeoutMs = timeoutMs || FETCH_TIMEOUT;
  retries = retries != null ? retries : FETCH_RETRIES;
  var lastErr = null;
  for (var attempt = 0; attempt <= retries; attempt++) {
    try {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, timeoutMs);
      var fetchOpts = Object.assign({}, options || {}, { signal: controller.signal });
      var resp = await fetch(url, fetchOpts);
      clearTimeout(timer);
      if (!resp.ok && attempt < retries && resp.status >= 500) {
        await sleep(1000 * (attempt + 1));
        continue;
      }
      return resp;
    } catch (e) {
      lastErr = e;
      if (attempt < retries) await sleep(1500 * (attempt + 1));
    }
  }
  throw lastErr || new Error('请求失败（已重试' + FETCH_RETRIES + '次）');
}

function parseMarkdown(text){
  // 简易 Markdown 渲染（代码块、标题、列表、引用）
  var lines=text.split('\n');
  var out='',inCode=false,codeBuf='';
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.trim().startsWith('```')){
      if(!inCode){inCode=true;codeBuf='';continue}
      else{out+='<pre><code>'+escapeHtml(codeBuf)+'</code></pre>';inCode=false;codeBuf='';continue}
    }
    if(inCode){codeBuf+=(codeBuf?'\n':'')+l;continue}
    var tl=l.trim();
    if(/^###?\s/.test(tl)){var lvl=tl.startsWith('###')?3:2;out+='<h'+lvl+'>'+escapeHtml(tl.replace(/^###?\s/,''))+'</h'+lvl+'>';continue}
    if(/^>\s/.test(tl)){out+='<blockquote>'+escapeHtml(tl.replace(/^>\s?/,''))+'</blockquote>';continue}
    if(/^[-*]\s/.test(tl)){out+='<li>'+escapeHtml(tl.replace(/^[-*]\s/,''))+'</li>';continue}
    if(/^\d+\.\s/.test(tl)){out+='<li>'+escapeHtml(tl.replace(/^\d+\.\s/,''))+'</li>';continue}
    out+=escapeHtml(l)+'<br>';
  }
  if(inCode){out+='<pre><code>'+escapeHtml(codeBuf)+'</code></pre>'}
  // 行内 code
  out=out.replace(/`([^`]+)`/g,'<code>$1</code>');
  // bold
  out=out.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  return out;
}

    m.innerHTML='正在上传 '+(i+1)+'/'+total+' ：'+f.name+(f.size>5*1024*1024?' <span style="color:var(--accent);font-size:11px">大文件，后台处理中</span>':'')+'';
    m.className='upload-msg';
    var ok2=await uploadOneFile(f,bar,i,total);
    if(ok2)ok++;else fail++;
  }
  bar.style.width='100%';
  m.innerHTML='✅ 完成 '+(fail===0?'<span style="color:var(--green);font-size:16px">✔</span>':'');
  m.innerHTML+=ok+' 个成功'+(fail>0?'，❌ '+fail+' 个失败':'');
  m.className=fail?'upload-msg err':'upload-msg ok';
  setTimeout(function(){pg.style.display='none'},2000);
  document.getElementById('fileInput').value='';document.getElementById('folderInput').value='';refreshStats();
}
function uploadOneFile(file,bar,idx,total){
  console.log('uploadOneFile start:',file.name,file.size);
  return new Promise(function(resolve){
    var xhr=new XMLHttpRequest();
    xhr.open('POST',API()+'/api/upload',true);
    var fd=new FormData();fd.append('file',file);
    console.log('XHR ready, sending...');
    xhr.upload.onprogress=function(e){
      if(e.lengthComputable){
        var filePct=Math.round((e.loaded/e.total)*100);
        var overallPct=Math.round(((idx*100)+filePct)/(total*100)*100);
        bar.style.width=overallPct+'%';
      }
    };
    xhr.onload=function(){
      try{
        var d=JSON.parse(xhr.responseText);
        if(d.status==='processing'){
          // 异步任务：开始轮询
          var cat=d.category||'';
          var m=cat.match(/\(([^)]+)\)/);
          var taskId=m?m[1]:'';
          pollTask(taskId,file.name,resolve,bar,idx,total);
          return;
        }
        if(d.status==='ok'||d.chunks>0)resolve(true);else resolve(false);
      }catch(e){resolve(false)}
    };
    xhr.onerror=function(e){console.error('XHR error:',e);resolve(false)};
    xhr.ontimeout=function(){console.error('XHR timeout');resolve(false)};
    xhr.timeout=300000;  // 5分钟超时（大文件上传）
    xhr.send(fd);
  });
}
function pollTask(taskId,fileName,resolve,bar,idx,total){
  if(!taskId){resolve(false);return}
  var pollCount = 0;
  var poll=function(){
    pollCount++;
    if (pollCount > MAX_POLL_RETRIES) {
      console.error('Task poll timeout:', taskId);
      resolve(false);
      return;
    }
    fetchWithTimeout(API()+'/api/task/'+taskId).then(function(r){return r.json()}).then(function(d){
      if(d.status==='done'){
        bar.style.width=Math.round(((idx+1)/total)*100)+'%';
        resolve(true);
      }else if(d.status==='error'){
        console.error('Task error:',d.message);
        resolve(false);
      }else{
        var filePct=d.progress||0;
        var overallPct=Math.round(((idx*100)+filePct)/(total*100)*100);
        bar.style.width=overallPct+'%';
        setTimeout(poll,2000);
      }
    }).catch(function(){setTimeout(poll,3000)});
  };
  poll();
}

async function openTool(id){
  // 先从后端获取的工具列表中查找
  try{
    var r=await fetchWithTimeout(API()+'/api/tools',null,3000,0);var d=await r.json();
    var tools=d.tools||[];
    var t=tools.find(function(x){return x.id===id});
    if(t){if(t.url&&!t.url.startsWith('#')){if(t.url.startsWith('\\\\')){alert(t.name+'\n\n'+t.url);return}window.open(t.url,'_blank');return}else{alert(t.name+'\n\n'+t.desc+'\n\n'+(t.available?'':'暂不可用'));return}}
  }catch(e){}
  // 回退到本地 TOOL_URLS
  var t2=TOOL_URLS[id];if(!t2){alert('工具未配置');return}
  if(t2.url.startsWith('\\\\')){alert(t2.name+'\n\n'+t2.url);return}
  if(t2.url.startsWith('#')){alert(t2.name+'\n\n'+t2.desc+'\n\nURL 待配置');return}
  window.open(t2.url,'_blank');
}
